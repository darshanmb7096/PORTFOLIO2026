<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Details - Darshan MB</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="palettes.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">>DARSHAN</div>
            <ul class="nav-menu">
                <li class="nav-item"><a href="index.html#home" class="nav-link">Home</a></li>
                <li class="nav-item"><a href="index.html#about" class="nav-link">About</a></li>
                <li class="nav-item"><a href="index.html#skills" class="nav-link">Skills</a></li>
                <li class="nav-item"><a href="projects.html" class="nav-link">Projects</a></li>
                <li class="nav-item"><a href="index.html#contact" class="nav-link">Contact</a></li>
            </ul>
            <div class="nav-right">
                <button id="theme-toggle" class="nav-theme-toggle" aria-label="Toggle theme" title="Light/Dark">
                    <i class="fas fa-moon"></i>
                </button>
                <div class="palette-dropdown">
                    <button id="palette-toggle" class="nav-palette-toggle" aria-label="Color Palettes" title="Choose Color Palette">
                        <i class="fas fa-palette"></i>
                    </button>
                    <div class="palette-menu" id="palette-menu">
                        <div class="palette-option" data-palette="teal-dark" title="Teal-Dark" style="background: linear-gradient(135deg, #599692, #11172a);"></div>
                        <div class="palette-option" data-palette="neon-red" title="Neon-Red" style="background: linear-gradient(135deg, #c91b68, #0d0f12);"></div>
                        <div class="palette-option" data-palette="purple" title="Purple" style="background: linear-gradient(135deg, #6049ea, #000000);"></div>
                        <div class="palette-option" data-palette="bright-green" title="Bright-Green" style="background: linear-gradient(135deg, #01c16a, #111827);"></div>
                        <div class="palette-option" data-palette="classic" title="Classic B/W" style="background: linear-gradient(135deg, #333333, #121212);"></div>
                    </div>
                </div>
            </div>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

<main class="project-details-main">
        <div class="hero-bubbles">
            <div class="bubble" style="--left: 5%; --delay: 0s; --duration: 25s; --size: 60px; opacity: 0.6;"></div>
            <div class="bubble" style="--left: 25%; --delay: -5s; --duration: 30s; --size: 80px; opacity: 0.4;"></div>
            <div class="bubble" style="--left: 50%; --delay: -10s; --duration: 28s; --size: 50px; opacity: 0.5;"></div>
            <div class="bubble" style="--left: 75%; --delay: -15s; --duration: 32s; --size: 70px; opacity: 0.3;"></div>
        </div>

        <div class="container">
            <div id="project-content">
                <!-- Dynamic content -->
            </div>


            <!-- Compact Project Navigation -->
            <div class="project-nav-compact">
                <a id="prev-btn" href="#" class="nav-compact-btn" title="Previous">
                    <i class="fas fa-chevron-left"></i>
                </a>
                <a href="projects.html" class="nav-main-btn btn btn-secondary">
                    All Projects
                </a>
                <a id="next-btn" href="#" class="nav-compact-btn" title="Next">
                    <i class="fas fa-chevron-right"></i>
                </a>
            </div>

        </div>
    </main>

    <button id="scroll-top" class="scroll-top" title="Back to Top">
        <i class="fas fa-chevron-up"></i>
    </button>


    <script src="script.js"></script>
    <script src="project-details.js"></script>

</body>
</html>
